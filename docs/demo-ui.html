<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Alcove — UI Demo</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#d3a66f",
          "background-dark": "#1e1a14",
          "surface-dark": "#2a241d",
          "card-dark": "#241f18",
        },
        fontFamily: { "display": ["Space Grotesk"] },
        borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
      },
    },
  }
</script>
<style>
  body { font-family: 'Space Grotesk', sans-serif; }

  .custom-scrollbar::-webkit-scrollbar { width: 4px; }
  .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
  .custom-scrollbar::-webkit-scrollbar-thumb { background: #41372a; border-radius: 10px; }

  /* Results fade */
  #results-area { transition: opacity 0.35s ease; opacity: 1; }
  #results-area.fading { opacity: 0; }

  /* Card entrance */
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .result-card { opacity: 0; animation: slideIn 0.35s ease forwards; }
  .result-card:nth-child(2) { animation-delay: 0.07s; }
  .result-card:nth-child(3) { animation-delay: 0.14s; }
  .result-card:nth-child(4) { animation-delay: 0.21s; }

  /* Toggle */
  #toggle-btn { transition: background 0.2s ease; }
  #toggle-thumb { transition: transform 0.2s ease; }

  /* Badge colors */
  .badge-prod21      { background: rgba(211,166,111,.18); color: #d3a66f;  border-color: rgba(211,166,111,.25); }
  .badge-prod23      { background: rgba( 56,189,248,.15); color: #7dd3fc;  border-color: rgba( 56,189,248,.20); }
  .badge-research    { background: rgba( 52,211,153,.15); color: #6ee7b7;  border-color: rgba( 52,211,153,.20); }
  .badge-transcripts { background: rgba(167,139,250,.15); color: #c4b5fd;  border-color: rgba(167,139,250,.20); }

  /* Scene label */
  #scene-label {
    position: fixed; bottom: 68px; left: 50%; transform: translateX(-50%);
    background: rgba(30,26,20,.92); border: 1px solid rgba(211,166,111,.22);
    backdrop-filter: blur(8px); padding: 5px 18px; border-radius: 20px;
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: .1em; color: #d3a66f; pointer-events: none;
    transition: opacity .3s ease;
    white-space: nowrap;
  }

  /* Controls */
  .controls {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 10px;
    background: rgba(30,26,20,.92); border: 1px solid rgba(211,166,111,.15);
    backdrop-filter: blur(8px); padding: 7px 14px; border-radius: 24px;
  }
  .ctrl-btn {
    width: 26px; height: 26px; display: flex; align-items: center; justify-content: center;
    border-radius: 50%; color: rgba(211,166,111,.55); cursor: pointer;
    transition: all .15s; border: 1px solid rgba(211,166,111,.15); background: transparent;
    font-size: 14px; line-height: 1;
  }
  .ctrl-btn:hover { color: #d3a66f; border-color: rgba(211,166,111,.4); background: rgba(211,166,111,.08); }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(211,166,111,.22); cursor: pointer; transition: all .2s; }
  .dot.active { background: #d3a66f; width: 16px; border-radius: 3px; }

  /* Progress */
  #prog { position: fixed; top: 0; left: 0; height: 2px; background: #d3a66f; opacity: .55; transition: none; }
</style>
</head>
<body class="bg-background-dark text-slate-100 antialiased min-h-screen flex overflow-hidden">

<div id="prog" style="width:0%"></div>

<!-- Sidebar -->
<aside class="w-[240px] border-r border-primary/10 flex flex-col h-screen sticky top-0 bg-background-dark shrink-0">
  <div class="p-6 flex items-center gap-3">
    <div class="size-8 bg-primary rounded-lg flex items-center justify-center text-background-dark">
      <span class="material-symbols-outlined text-xl">folder_shared</span>
    </div>
    <div>
      <h1 class="text-xl font-bold leading-none tracking-tight">Alcove</h1>
      <p class="text-[10px] uppercase tracking-widest text-primary/60 font-medium">Document Search</p>
    </div>
  </div>
  <nav class="flex-1 px-4 overflow-y-auto custom-scrollbar">
    <div class="mb-6">
      <h2 class="text-[11px] font-semibold text-primary/40 uppercase tracking-widest px-2 mb-3">Collections</h2>
      <div id="collections-list" class="space-y-1"></div>
    </div>
  </nav>
  <div class="p-6 border-t border-primary/10">
    <div class="flex items-center gap-2 text-[10px] text-primary/50 font-medium uppercase tracking-tighter">
      <span class="size-1.5 bg-green-500 rounded-full"></span>
      runs locally · no cloud
    </div>
  </div>
</aside>

<!-- Main -->
<main class="flex-1 flex flex-col min-w-0">
  <header class="p-6 pb-0 space-y-4">
    <!-- Search bar + toggle -->
    <div class="max-w-4xl mx-auto w-full flex gap-4 items-center">
      <div class="relative flex-1">
        <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
          <span class="material-symbols-outlined text-primary/50">search</span>
        </div>
        <input id="search-input"
          class="w-full bg-surface-dark/40 border border-primary/10 rounded-xl py-3.5 pl-12 pr-4 text-slate-100 placeholder:text-primary/30 focus:outline-none transition-all shadow-sm"
          placeholder="Ask anything about your corpus..."
          type="text" readonly/>
      </div>
      <div class="flex items-center gap-3 bg-surface-dark/40 border border-primary/10 px-4 py-2 rounded-xl shrink-0">
        <span id="toggle-mode-label" class="text-xs font-bold uppercase tracking-tight text-primary/70">Semantic</span>
        <button id="toggle-btn"
          class="relative inline-flex h-5 w-9 shrink-0 rounded-full border-2 border-transparent bg-primary">
          <span id="toggle-thumb"
            class="translate-x-4 pointer-events-none inline-block h-4 w-4 transform rounded-full bg-white shadow"></span>
        </button>
      </div>
    </div>

    <!-- Filters -->
    <div class="max-w-4xl mx-auto w-full">
      <details id="filters-details" class="group">
        <summary class="flex items-center justify-between py-2 px-2 cursor-pointer text-xs font-semibold uppercase tracking-widest text-primary/60 hover:text-primary transition-colors select-none">
          <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-sm">tune</span>Filters
          </div>
          <span class="material-symbols-outlined group-open:rotate-180 transition-transform duration-200">expand_more</span>
        </summary>
        <div class="p-4 border border-dashed border-primary/20 rounded-lg mt-2 mb-4 bg-primary/5">
          <div class="grid grid-cols-3 gap-4">
            <div class="space-y-1">
              <span class="text-[10px] text-primary/60 font-bold uppercase">Date Range</span>
              <div class="h-8 bg-surface-dark/60 rounded flex items-center px-3 text-xs">2019 - 2024</div>
            </div>
            <div class="space-y-1">
              <span class="text-[10px] text-primary/60 font-bold uppercase">File Type</span>
              <div class="h-8 bg-surface-dark/60 rounded flex items-center px-3 text-xs">PDF · TXT · DOCX · MD</div>
            </div>
            <div class="space-y-1">
              <span class="text-[10px] text-primary/60 font-bold uppercase">Min Score</span>
              <div class="h-8 bg-surface-dark/60 rounded flex items-center px-3 text-xs">0.75 +</div>
            </div>
          </div>
        </div>
      </details>
    </div>
  </header>

  <!-- Results -->
  <div class="flex-1 overflow-y-auto p-6 custom-scrollbar">
    <div id="results-area" class="max-w-4xl mx-auto space-y-4"></div>
  </div>
</main>

<!-- Overlays -->
<div id="scene-label">...</div>

<div class="controls">
  <button class="ctrl-btn" onclick="prevScene()">&#8592;</button>
  <div id="dots" class="flex items-center gap-2"></div>
  <button class="ctrl-btn" id="pause-btn" onclick="togglePause()">&#10074;&#10074;</button>
  <button class="ctrl-btn" onclick="nextScene()">&#8594;</button>
</div>

<!-- Script -->
<script>
// Data

const COLLS = [
  { name:'Production 2021', count:120, cls:'badge-prod21',      icon:'movie' },
  { name:'Production 2023', count: 85, cls:'badge-prod23',      icon:'movie' },
  { name:'Research Notes',  count:210, cls:'badge-research',    icon:'notes' },
  { name:'Transcripts',     count: 45, cls:'badge-transcripts', icon:'transcribe' },
];

const SEMANTIC_RESULTS = [
  { icon:'picture_as_pdf', file:'source_01.pdf',         coll:0, score:.91,
    text:'"My <b class="text-primary">old man</b> never said it directly, but you could tell by the way he watched us..."' },
  { icon:'description',    file:'notes_final.txt',        coll:2, score:.87,
    text:'"There was just this <b class="text-primary">absence</b> where a father should have been..."' },
  { icon:'article',        file:'interview_04.docx',      coll:3, score:.84,
    text:'"Every time we went <b class="text-primary">fishing</b>, just the two of us, I understood something..."' },
];

const MULTI_RESULTS = [
  ...SEMANTIC_RESULTS,
  { icon:'text_snippet',   file:'producer_notes_2019.md', coll:1, score:.80,
    text:'"The bond between them was the whole thread of the film, even when he didn\'t say it..."' },
];

// UI helpers

function renderCollections(checked) {
  document.getElementById('collections-list').innerHTML = COLLS.map((c,i) => `
    <label class="flex items-center gap-3 px-2 py-1.5 rounded-lg cursor-pointer group transition-colors hover:bg-primary/5">
      <input ${checked[i]?'checked':''} type="checkbox"
        class="rounded border-primary/30 bg-transparent text-primary focus:ring-primary/20 focus:ring-offset-0" readonly/>
      <span class="text-sm font-medium flex-1">${c.name}</span>
      <span class="text-xs text-primary/40 group-hover:text-primary/60">(${c.count})</span>
    </label>`).join('');
}

function setToggle(on) {
  const btn   = document.getElementById('toggle-btn');
  const thumb = document.getElementById('toggle-thumb');
  const lbl   = document.getElementById('toggle-mode-label');
  btn.style.background   = on ? '#d3a66f' : 'rgba(211,166,111,.18)';
  thumb.style.transform  = on ? 'translateX(1rem)' : 'translateX(0)';
  lbl.textContent        = on ? 'Semantic' : 'Keyword';
  lbl.style.color        = on ? '#d3a66f'  : 'rgba(211,166,111,.5)';
}

function setFilters(open) {
  document.getElementById('filters-details').open = open;
}

function cardHTML(r, idx) {
  const c = COLLS[r.coll];
  const w = Math.round(r.score * 100);
  return `
    <div class="result-card bg-card-dark border border-primary/10 rounded-xl p-5
                hover:border-primary/30 transition-all group cursor-pointer shadow-lg">
      <div class="flex justify-between items-start mb-3">
        <div class="flex items-center gap-3 min-w-0">
          <span class="material-symbols-outlined text-primary/70 shrink-0">${r.icon}</span>
          <h3 class="font-bold text-base truncate">${r.file}</h3>
          <span class="text-[10px] font-bold uppercase px-2 py-0.5 rounded tracking-wider border shrink-0 ${c.cls}">${c.name}</span>
        </div>
        <div class="flex items-center gap-3 shrink-0 ml-4">
          <div class="flex flex-col items-end gap-1">
            <span class="text-[10px] text-primary/50 font-bold uppercase tracking-tighter">Score</span>
            <div class="w-20 h-1.5 bg-primary/10 rounded-full overflow-hidden">
              <div class="h-full bg-primary" style="width:${w}%"></div>
            </div>
            <span class="text-[10px] text-primary font-bold">${r.score}</span>
          </div>
          <span class="material-symbols-outlined text-primary/30 group-hover:text-primary transition-colors">chevron_right</span>
        </div>
      </div>
      <p class="text-primary/75 text-sm italic font-light border-l-2 border-primary/30 pl-4 py-0.5 leading-relaxed">${r.text}</p>
    </div>`;
}

function setResults(state) {
  const area = document.getElementById('results-area');
  area.classList.add('fading');
  setTimeout(() => {
    switch (state) {
      case 'empty':
        area.innerHTML = `
          <div class="flex flex-col items-center justify-center py-24 text-center">
            <div class="size-16 bg-primary/8 rounded-2xl flex items-center justify-center mb-6">
              <span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings:'FILL' 0">folder_open</span>
            </div>
            <h2 class="text-xl font-semibold mb-2 text-slate-200">Drop your documents here</h2>
            <p class="text-primary/45 text-sm max-w-xs leading-relaxed">
              Point Alcove at a folder and it builds a local semantic index.<br/>No upload. No cloud. No subscription.
            </p>
          </div>`;
        break;
      case 'typing':
        area.innerHTML = `
          <div class="flex flex-col items-center justify-center py-28 text-center">
            <span class="material-symbols-outlined text-primary/20 text-5xl mb-4">manage_search</span>
            <p class="text-primary/30 text-sm">Searching...</p>
          </div>`;
        break;
      case 'semantic':
      case 'semantic-father':
        const label = state === 'semantic-father'
          ? '<p class="text-xs text-primary/40 mb-4 px-1">Searching "father" - semantic mode - 3 results</p>'
          : '<p class="text-xs text-primary/40 mb-4 px-1">3 results for "relationship with father"</p>';
        area.innerHTML = label + SEMANTIC_RESULTS.map(cardHTML).join('');
        break;
      case 'keyword-fail':
        area.innerHTML = `
          <p class="text-xs text-primary/40 mb-4 px-1">Searching "father" - keyword mode</p>
          <div class="flex flex-col items-center justify-center py-20 text-center
                      border border-dashed border-primary/12 rounded-xl">
            <span class="material-symbols-outlined text-primary/18 text-5xl mb-4">search_off</span>
            <h3 class="font-bold text-lg text-primary/40 mb-1">0 matches</h3>
            <p class="text-primary/25 text-sm max-w-xs leading-relaxed">
              No document contains the exact word "father".<br/>
              Switch to semantic mode to search by meaning.
            </p>
          </div>`;
        break;
      case 'multi':
        area.innerHTML = '<p class="text-xs text-primary/40 mb-4 px-1">4 results across all collections</p>'
          + MULTI_RESULTS.map(cardHTML).join('');
        break;
    }
    area.classList.remove('fading');
  }, 320);
}

function setQuery(text) {
  document.getElementById('search-input').value = text;
}

// Typewriter

let _typeTimer = null;
function typeQuery(text, onDone) {
  const el = document.getElementById('search-input');
  el.value = '';
  let i = 0;
  clearInterval(_typeTimer);
  _typeTimer = setInterval(() => {
    if (i < text.length) { el.value += text[i++]; }
    else {
      clearInterval(_typeTimer);
      if (onDone) onDone();
    }
  }, 36);
}

// Scenes

const SCENES = [
  {
    label: 'Your corpus. Local. Private.',
    run() {
      renderCollections([true, false, false, false]);
      setToggle(true);
      setFilters(false);
      setQuery('');
      setResults('empty');
    }
  },
  {
    label: 'Ask in plain language',
    run() {
      renderCollections([true, false, false, false]);
      setToggle(true);
      setFilters(false);
      setResults('typing');
      typeQuery('what did subjects say about their relationship with their father', () => {
        if (_cur === 1) setResults('semantic');
      });
    }
  },
  {
    label: 'Finds meaning, not just words',
    run() {
      renderCollections([true, false, true, true]);
      setToggle(true);
      setFilters(false);
      setQuery('what did subjects say about their relationship with their father');
      setResults('semantic');
    }
  },
  {
    label: 'Keyword search: 0 results',
    run() {
      renderCollections([true, false, true, true]);
      setToggle(false);
      setFilters(false);
      setQuery('father');
      setResults('keyword-fail');
    }
  },
  {
    label: 'Semantic: 3 results for the same query',
    run() {
      renderCollections([true, false, true, true]);
      setToggle(true);
      setFilters(false);
      setQuery('father');
      setResults('semantic-father');
    }
  },
  {
    label: 'Search across all collections',
    run() {
      renderCollections([true, true, true, true]);
      setToggle(true);
      setFilters(false);
      setQuery('relationship with father');
      setResults('multi');
    }
  },
];

// Engine

let _cur     = 0;
let _paused  = false;
let _raf     = null;
let _t0      = null;
const DUR    = 7500;

function goTo(n) {
  _cur = ((n % SCENES.length) + SCENES.length) % SCENES.length;
  SCENES[_cur].run();
  document.getElementById('scene-label').textContent = SCENES[_cur].label;
  renderDots();
  resetProgress();
}

function nextScene() { goTo(_cur + 1); }
function prevScene() { goTo(_cur - 1); }

function togglePause() {
  _paused = !_paused;
  document.getElementById('pause-btn').innerHTML = _paused ? '&#9654;' : '&#10074;&#10074;';
  if (_paused) cancelAnimationFrame(_raf);
  else { _t0 = null; tickProgress(); }
}

function resetProgress() {
  cancelAnimationFrame(_raf);
  if (_paused) return;
  _t0 = null;
  tickProgress();
}

function tickProgress(ts) {
  if (!_t0) _t0 = ts || performance.now();
  const pct = Math.min(100, ((( ts || performance.now()) - _t0) / DUR) * 100);
  document.getElementById('prog').style.width = pct + '%';
  if (pct < 100) { _raf = requestAnimationFrame(tickProgress); }
  else           { nextScene(); }
}

function renderDots() {
  document.getElementById('dots').innerHTML = SCENES.map((_, i) =>
    `<div class="dot${i===_cur?' active':''}" onclick="goTo(${i})"></div>`).join('');
}

// Init
renderDots();
goTo(0);
</script>
</body>
</html>
