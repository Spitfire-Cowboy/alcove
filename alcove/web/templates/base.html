<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ alcove_title }}{% endblock %}</title>
  <script>
    (function() {
      var t = localStorage.getItem('alcove-theme');
      if (t) document.documentElement.dataset.theme = t;
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  {% if alcove_accent_color or alcove_accent_color_light %}
  <style>
    {% if alcove_accent_color %}
    :root, [data-theme="dark"] {
      --gold: {{ alcove_accent_color }};
      --gold-dim: {{ alcove_accent_color }}80;
      --gold-faint: {{ alcove_accent_color }}14;
      --gold-glow: {{ alcove_accent_color }}2e;
    }
    {% endif %}
    {% if alcove_accent_color_light %}
    @media (prefers-color-scheme: light) {
      :root:not([data-theme]) {
        --gold: {{ alcove_accent_color_light }};
        --gold-dim: {{ alcove_accent_color_light }}99;
        --gold-faint: {{ alcove_accent_color_light }}0f;
        --gold-glow: {{ alcove_accent_color_light }}24;
      }
    }
    [data-theme="light"] {
      --gold: {{ alcove_accent_color_light }};
      --gold-dim: {{ alcove_accent_color_light }}99;
      --gold-faint: {{ alcove_accent_color_light }}0f;
      --gold-glow: {{ alcove_accent_color_light }}24;
    }
    {% endif %}
  </style>
  {% endif %}
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
    <span id="theme-icon">&#9790;</span>
  </button>

  <div class="page-wrap">
    <header class="site-header">
      <div class="container">
        <a href="/" class="logo-row" style="text-decoration:none;color:inherit;">
          <div class="logo-mark" aria-hidden="true">{{ alcove_logo_text }}</div>
          <h1 class="site-title">{{ alcove_title }}</h1>
        </a>
        <p class="site-tagline">{{ alcove_tagline }}</p>
      </div>
    </header>

    <main class="site-main" id="main-content">
      <div class="container">
        {% block content %}{% endblock %}
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>
          <span class="footer-dot" aria-hidden="true"></span>
          {{ alcove_footer_text }}
        </p>
      </div>
    </footer>
  </div>

  <script>
    (function() {
      var btn = document.getElementById('theme-toggle');
      var icon = document.getElementById('theme-icon');
      var states = ['auto', 'light', 'dark'];
      var icons = {'auto': '&#9881;', 'light': '&#9728;', 'dark': '&#9790;'};
      var labels = {'auto': 'Auto theme', 'light': 'Light theme', 'dark': 'Dark theme'};

      function getCurrent() {
        return localStorage.getItem('alcove-theme') || 'auto';
      }

      function apply(theme) {
        if (theme === 'auto') {
          delete document.documentElement.dataset.theme;
          localStorage.removeItem('alcove-theme');
        } else {
          document.documentElement.dataset.theme = theme;
          localStorage.setItem('alcove-theme', theme);
        }
        icon.innerHTML = icons[theme];
        btn.setAttribute('aria-label', labels[theme]);
      }

      apply(getCurrent());

      btn.addEventListener('click', function() {
        var cur = getCurrent();
        var next = states[(states.indexOf(cur) + 1) % states.length];
        apply(next);
      });
    })();
  </script>
</body>
</html>
