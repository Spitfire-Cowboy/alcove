name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  commit-metadata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Block Co-authored-by trailers in commit messages
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            RANGE="${BASE_SHA}..${HEAD_SHA}"
          else
            if [[ "$BEFORE_SHA" == "0000000000000000000000000000000000000000" ]]; then
              RANGE="$CURRENT_SHA"
            else
              RANGE="${BEFORE_SHA}..${CURRENT_SHA}"
            fi
          fi

          python3 scripts/check_commit_messages.py "$RANGE"

  test:
    needs: commit-metadata
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Set up environment
        run: |
          cp .env.example .env
          mkdir -p data/raw data/processed data/chroma

      - name: Run tests with coverage
        run: |
          python -m pip install coverage
          python -m coverage run --source=alcove -m pytest -q --junitxml=junit.xml -o junit_family=legacy
          python -m coverage xml -o coverage.xml
          python -m coverage report

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
